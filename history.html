<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My History — EnergyOS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --orange: #E85D04; --orange-dark: #c44e03; --black: #0a0a0a; --white: #ffffff; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--black); color: var(--white); min-height: 100vh; }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 64px;
      background: rgba(10,10,10,0.97); backdrop-filter: blur(16px);
      border-bottom: 1px solid #1f1f1f;
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--white); }
    .logo-text { font-size: 1.4rem; font-weight: 800; }
    .logo-text span { color: var(--orange); }
    nav ul { display: flex; list-style: none; gap: 2rem; align-items: center; }
    nav ul a { text-decoration: none; color: #ccc; font-size: 0.95rem; font-weight: 500; transition: color 0.2s; }
    nav ul a:hover { color: var(--orange); }
    .nav-cta { background: var(--orange) !important; color: var(--white) !important; padding: 8px 20px !important; border-radius: 6px !important; font-weight: 600 !important; }
    footer nav { position: static; background: none; border: none; box-shadow: none; height: auto; padding: 0; display: block; backdrop-filter: none; margin-bottom: 1.5rem; }
    .page-wrap { max-width: 780px; margin: 0 auto; padding: 100px 2rem 80px; }
    .page-header { margin-bottom: 32px; }
    .page-header h1 { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
    .page-header p { color: #666; font-size: 0.95rem; }
    .user-bar { display: flex; justify-content: space-between; align-items: center; background: #111; border: 1px solid #1f1f1f; border-radius: 12px; padding: 14px 18px; margin-bottom: 28px; }
    .user-email { color: #888; font-size: 0.9rem; }
    .signout-btn { color: #555; font-size: 0.85rem; cursor: pointer; background: none; border: none; font-family: inherit; transition: color 0.2s; }
    .signout-btn:hover { color: var(--orange); }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 32px; }
    .stat-card { background: #111; border: 1px solid #1f1f1f; border-radius: 12px; padding: 20px; text-align: center; }
    .stat-num { font-size: 2rem; font-weight: 800; color: var(--orange); }
    .stat-lbl { color: #666; font-size: 0.8rem; margin-top: 4px; }
    .section-title { font-size: 0.8rem; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
    .checkin-card { background: #111; border: 1px solid #1f1f1f; border-radius: 12px; padding: 18px; margin-bottom: 12px; }
    .checkin-date { color: var(--orange); font-size: 0.82rem; font-weight: 600; margin-bottom: 10px; }
    .checkin-stats { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 8px; }
    .checkin-stat { color: #ccc; font-size: 0.9rem; }
    .checkin-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag { font-size: 0.72rem; padding: 3px 10px; border-radius: 20px; background: #1a1a1a; color: #888; border: 1px solid #2a2a2a; }
    .tag.warning { background: rgba(232,93,4,0.1); color: var(--orange); border-color: rgba(232,93,4,0.2); }
    .empty { text-align: center; padding: 60px 0; }
    .empty p { color: #555; margin-bottom: 20px; }
    .cta-btn { display: inline-block; background: var(--orange); color: #fff; text-decoration: none; padding: 14px 28px; border-radius: 10px; font-weight: 600; font-size: 0.95rem; }
    .loading { text-align: center; padding: 60px 0; color: #555; }
    .spinner { width: 32px; height: 32px; border: 3px solid #1f1f1f; border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer { border-top: 1px solid #1f1f1f; padding: 3rem 2rem; text-align: center; margin-top: 80px; }
    .footer-logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 1rem; text-decoration: none; color: var(--white); }
    footer nav a { color: #666; text-decoration: none; font-size: 0.88rem; margin: 0 1rem; transition: color 0.2s; }
    footer nav a:hover { color: var(--orange); }
    footer p { color: #444; font-size: 0.82rem; }
    @media (max-width: 600px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      nav ul { display: none; }
    }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">
    <svg width="32" height="32" viewBox="0 0 36 36" fill="none">
      <rect width="36" height="36" rx="8" fill="#E85D04"/>
      <polyline points="4,18 9,18 12,10 16,26 20,14 23,21 26,18 32,18" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="logo-text">Energy<span>OS</span></span>
  </a>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="how-it-works.html">How It Works</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="checkin.html" class="nav-cta">Check In</a></li>
  </ul>
</nav>

<div class="page-wrap">
  <div id="loading-state" class="loading">
    <div class="spinner"></div>
    <p>Loading your history...</p>
  </div>

  <div id="main-content" style="display:none;">
    <div class="page-header">
      <h1>My Check-in History</h1>
      <p>Track your energy patterns over time.</p>
    </div>

    <div class="user-bar">
      <span class="user-email" id="user-email"></span>
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>

    <div class="stats-row" id="stats-row"></div>

    <div class="section-title">Recent Check-ins</div>
    <div id="checkins-list"></div>
  </div>
</div>

<footer>
  <a href="index.html" class="footer-logo">
    <svg width="28" height="28" viewBox="0 0 36 36" fill="none">
      <rect width="36" height="36" rx="8" fill="#E85D04"/>
      <polyline points="4,18 9,18 12,10 16,26 20,14 23,21 26,18 32,18" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span style="font-size:1.2rem;font-weight:800;">Energy<span style="color:#E85D04">OS</span></span>
  </a>
  <nav>
    <a href="index.html">Home</a>
    <a href="how-it-works.html">How It Works</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
  <p>&copy; 2026 EnergyOS. Built by Josh Virostek. All rights reserved.</p>
</footer>

<script>
  const token = localStorage.getItem('eos_session');
  const user = JSON.parse(localStorage.getItem('eos_user') || 'null');

  if (!token) {
    window.location.href = 'login.html?redirect=history.html';
  } else {
    document.getElementById('user-email').textContent = user?.email || '';
    loadHistory();
  }

  async function loadHistory() {
    try {
      const res = await fetch('/api/history', {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.status === 401) { signOut(); return; }
      const data = await res.json();
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
      renderHistory(data.checkins || []);
    } catch (e) {
      document.getElementById('loading-state').innerHTML = '<p style="color:#555">Failed to load history.</p>';
    }
  }

  function renderHistory(checkins) {
    // Stats
    const avgEnergy = checkins.length ? Math.round(checkins.reduce((s, c) => s + (c.energy || 0), 0) / checkins.length) : 0;
    const avgSleep = checkins.length ? (checkins.reduce((s, c) => s + (c.sleep_hours || 0), 0) / checkins.length).toFixed(1) : 0;
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-card"><div class="stat-num">${checkins.length}</div><div class="stat-lbl">Total check-ins</div></div>
      <div class="stat-card"><div class="stat-num">${avgEnergy}<span style="font-size:1rem;color:#555">/10</span></div><div class="stat-lbl">Avg energy</div></div>
      <div class="stat-card"><div class="stat-num">${avgSleep}<span style="font-size:1rem;color:#555">h</span></div><div class="stat-lbl">Avg sleep</div></div>
    `;

    const list = document.getElementById('checkins-list');
    if (checkins.length === 0) {
      list.innerHTML = `<div class="empty"><p>No check-ins yet.</p><a href="checkin.html" class="cta-btn">Do your first check-in →</a></div>`;
      return;
    }

    list.innerHTML = checkins.map(c => {
      const date = new Date(c.checked_in_at).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      const tags = [];
      if (c.caffeine && c.caffeine !== 'None') tags.push({ label: '☕ ' + c.caffeine, warn: false });
      if (c.alcohol && c.alcohol !== 'None') tags.push({ label: '🍺 ' + c.alcohol, warn: true });
      if (c.nicotine && c.nicotine !== 'None' && c.nicotine !== 'Not recently') tags.push({ label: '🚬 ' + c.nicotine, warn: true });
      if (c.sick && c.sick !== 'No, feeling healthy') tags.push({ label: '🤒 ' + c.sick, warn: true });

      return `
        <div class="checkin-card">
          <div class="checkin-date">${date}</div>
          <div class="checkin-stats">
            <span class="checkin-stat">⚡ Energy ${c.energy}/10</span>
            <span class="checkin-stat">😊 Mood ${c.mood}/10</span>
            <span class="checkin-stat">😰 Stress ${c.stress}/10</span>
            <span class="checkin-stat">😴 ${c.sleep_hours}h sleep</span>
            ${c.bpm ? `<span class="checkin-stat">❤️ ${c.bpm} bpm</span>` : ''}
          </div>
          ${tags.length > 0 ? `<div class="checkin-tags">${tags.map(t => `<span class="tag ${t.warn ? 'warning' : ''}">${t.label}</span>`).join('')}</div>` : ''}
        </div>
      `;
    }).join('');
  }

  function signOut() {
    localStorage.removeItem('eos_session');
    localStorage.removeItem('eos_user');
    window.location.href = 'login.html';
  }
</script>
</body>
</html>
