<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — EnergyOS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --orange: #E85D04; --orange-dark: #c44e03; --black: #0a0a0a; --white: #ffffff; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--black); color: var(--white); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { width: 100%; max-width: 420px; }
    .logo { font-size: 2rem; font-weight: 800; text-align: center; margin-bottom: 8px; }
    .logo span { color: var(--orange); }
    .subtitle { color: #666; text-align: center; margin-bottom: 40px; font-size: 0.95rem; }
    .tabs { display: flex; background: #111; border-radius: 10px; padding: 4px; margin-bottom: 28px; }
    .tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 0.9rem; color: #666; transition: all 0.2s; border: none; background: none; font-family: inherit; }
    .tab.active { background: var(--orange); color: #fff; font-weight: 600; }
    .input { width: 100%; background: #111; color: var(--white); border: 1px solid #2a2a2a; border-radius: 10px; padding: 14px 16px; font-size: 0.95rem; font-family: inherit; margin-bottom: 12px; transition: border-color 0.2s; }
    .input:focus { outline: none; border-color: var(--orange); }
    .input::placeholder { color: #555; }
    .btn { width: 100%; background: var(--orange); color: #fff; border: none; border-radius: 10px; padding: 16px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-top: 4px; font-family: inherit; }
    .btn:hover { background: var(--orange-dark); }
    .btn:disabled { background: #333; cursor: not-allowed; }
    .error { color: #f87171; font-size: 0.85rem; margin-bottom: 12px; background: rgba(248,113,113,0.1); padding: 10px 14px; border-radius: 8px; display: none; }
    .back { display: block; text-align: center; margin-top: 20px; color: #555; text-decoration: none; font-size: 0.85rem; }
    .back:hover { color: var(--orange); }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Energy<span>OS</span></div>
  <div class="subtitle">Sign in to save your check-ins</div>

  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
    <button class="tab" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
  </div>

  <div id="error-msg" class="error"></div>

  <input type="email" class="input" id="email" placeholder="Email address" autocomplete="email" />
  <input type="password" class="input" id="password" placeholder="Password (min 6 characters)" autocomplete="current-password" />
  <button class="btn" id="auth-btn" onclick="handleAuth()">Sign In</button>

  <a href="index.html" class="back">← Back to home</a>
</div>

<script>
  let currentTab = 'login';

  // Redirect if already logged in
  const session = localStorage.getItem('eos_session');
  if (session) {
    const dest = new URLSearchParams(window.location.search).get('redirect') || 'checkin.html';
    window.location.href = dest;
  }

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('auth-btn').textContent = tab === 'login' ? 'Sign In' : 'Create Account';
    document.getElementById('error-msg').style.display = 'none';
  }

  async function handleAuth() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('auth-btn');
    const errEl = document.getElementById('error-msg');

    if (!email || !password) { showError('Please enter your email and password.'); return; }

    btn.disabled = true;
    btn.textContent = 'Loading...';
    errEl.style.display = 'none';

    try {
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: currentTab === 'login' ? 'login' : 'signup', email, password }),
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || 'Something went wrong.'); return; }
      if (currentTab === 'signup' && !data.session) {
        showError('Account created! Please check your email to confirm, then sign in.');
        switchTab('login');
        return;
      }
      localStorage.setItem('eos_session', data.session.access_token);
      localStorage.setItem('eos_user', JSON.stringify({ id: data.user.id, email: data.user.email }));
      const dest = new URLSearchParams(window.location.search).get('redirect') || 'checkin.html';
      window.location.href = dest;
    } catch (e) {
      showError('Network error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = currentTab === 'login' ? 'Sign In' : 'Create Account';
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleAuth(); });
</script>
</body>
</html>
